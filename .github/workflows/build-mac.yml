name: build-mac

# 在 GitHub 免费 macOS 云端构建 .app。
# 触发：手动运行（Actions 页面点 Run workflow），或推送 v* 标签。
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  # Apple Silicon（arm64）：在 macos-14 上原生构建
  build-apple-silicon:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.11.1
      - name: PyInstaller 打包
        run: pyinstaller fabu.spec --noconfirm
      - name: 打包成 zip
        run: cd dist && zip -ry "视频一键发布-apple-silicon.zip" "视频一键发布.app"
      - uses: actions/upload-artifact@v4
        with:
          name: 视频一键发布-apple-silicon
          path: dist/*.zip
          if-no-files-found: error

  # Intel（x86_64）：在 macos-14 上借 Rosetta + 通用版 Python 交叉构建，
  # 避免依赖稀缺的 macos-13 Intel runner。
  build-intel:
    runs-on: macos-14
    env:
      PYBIN: /Library/Frameworks/Python.framework/Versions/3.12/bin/python3
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Rosetta
        run: sudo softwareupdate --install-rosetta --agree-to-license
      - name: 安装通用版(universal2) Python 3.12
        run: |
          curl -fsSL -o python.pkg https://www.python.org/ftp/python/3.12.10/python-3.12.10-macos11.pkg
          sudo installer -pkg python.pkg -target /
          arch -x86_64 "$PYBIN" --version
      - name: 安装依赖（x86_64）
        run: |
          arch -x86_64 "$PYBIN" -m pip install --upgrade pip
          arch -x86_64 "$PYBIN" -m pip install -r requirements.txt
          arch -x86_64 "$PYBIN" -m pip install pyinstaller==6.11.1
      - name: PyInstaller 打包（x86_64）
        run: arch -x86_64 "$PYBIN" -m PyInstaller fabu.spec --noconfirm
      - name: 打包成 zip
        run: cd dist && zip -ry "视频一键发布-intel.zip" "视频一键发布.app"
      - uses: actions/upload-artifact@v4
        with:
          name: 视频一键发布-intel
          path: dist/*.zip
          if-no-files-found: error
