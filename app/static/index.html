<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>视频一键发布</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, "Microsoft YaHei", sans-serif;
         background: #f4f5f7; color: #1f2329; }
  header { background: #1f2329; color: #fff; padding: 14px 24px; font-size: 18px; font-weight: 600; }
  nav { display: flex; gap: 4px; background: #fff; padding: 0 24px; border-bottom: 1px solid #e5e6eb; }
  nav button { background: none; border: none; padding: 14px 18px; cursor: pointer; font-size: 15px;
               color: #4e5969; border-bottom: 2px solid transparent; }
  nav button.active { color: #165dff; border-bottom-color: #165dff; font-weight: 600; }
  main { max-width: 920px; margin: 24px auto; padding: 0 24px; }
  .card { background: #fff; border-radius: 10px; padding: 20px 24px; margin-bottom: 18px;
          box-shadow: 0 1px 4px rgba(0,0,0,.05); }
  h3 { margin: 0 0 14px; font-size: 16px; }
  label { display: block; font-size: 14px; color: #4e5969; margin: 14px 0 6px; }
  input[type=text], textarea, select, input[type=datetime-local] {
    width: 100%; padding: 9px 11px; border: 1px solid #d9dce0; border-radius: 6px; font-size: 14px;
    font-family: inherit; }
  textarea { resize: vertical; min-height: 70px; }
  .row { display: flex; gap: 12px; align-items: center; }
  .row > * { flex: 1; }
  .btn { background: #165dff; color: #fff; border: none; padding: 10px 20px; border-radius: 6px;
         cursor: pointer; font-size: 14px; }
  .btn:hover { background: #0e4ed6; }
  .btn.ghost { background: #f2f3f5; color: #1f2329; }
  .btn.ghost:hover { background: #e5e6eb; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .platforms { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 6px; }
  .pf { display: flex; align-items: center; gap: 7px; padding: 9px 14px; border: 1px solid #d9dce0;
        border-radius: 8px; cursor: pointer; }
  .pf input { width: auto; }
  .acct { display: flex; align-items: center; justify-content: space-between; padding: 12px 0;
          border-bottom: 1px solid #f0f0f0; }
  .acct:last-child { border-bottom: none; }
  .badge { font-size: 12px; padding: 3px 9px; border-radius: 10px; }
  .b-ok { background: #e8f7ee; color: #00b42a; }
  .b-no { background: #ffece8; color: #f53f3f; }
  .b-wait { background: #fff7e8; color: #ff7d00; }
  .b-run { background: #e8f3ff; color: #165dff; }
  .task { border: 1px solid #e5e6eb; border-radius: 8px; padding: 14px; margin-bottom: 12px; }
  .task-head { display: flex; justify-content: space-between; cursor: pointer; }
  .task-title { font-weight: 600; }
  .task-meta { font-size: 12px; color: #86909c; margin-top: 4px; }
  .pf-status { display: inline-block; margin: 4px 8px 0 0; font-size: 12px; }
  pre.log { background: #1e1e1e; color: #d4d4d4; padding: 14px; border-radius: 6px; max-height: 360px;
            overflow: auto; font-size: 12px; line-height: 1.5; white-space: pre-wrap; }
  .hint { font-size: 12px; color: #86909c; margin-top: 6px; }
  .hide { display: none; }
  .dropzone { border: 2px dashed #c9cdd4; border-radius: 10px; padding: 26px 16px; text-align: center;
              cursor: pointer; transition: all .15s; background: #fafbfc; }
  .dropzone:hover { border-color: #165dff; background: #f2f6ff; }
  .dropzone.dragover { border-color: #165dff; background: #e8f3ff; }
  .dz-main { font-size: 15px; color: #1f2329; }
  .dz-sub { font-size: 12px; color: #86909c; margin-top: 6px; }
  .selected { margin-top: 10px; padding: 10px 14px; background: #e8f7ee; border: 1px solid #aaeec1;
              border-radius: 8px; font-size: 14px; color: #00803a; word-break: break-all; }
  .vlist { margin-top: 8px; max-height: 180px; overflow: auto; border: 1px solid #f0f0f0;
           border-radius: 8px; }
  .vrow { display: flex; justify-content: space-between; padding: 9px 14px; cursor: pointer;
          border-bottom: 1px solid #f5f5f5; font-size: 14px; }
  .vrow:last-child { border-bottom: none; }
  .vrow:hover { background: #f2f6ff; }
  .vrow.active { background: #e8f3ff; color: #165dff; font-weight: 600; }
  .vrow .sz { color: #86909c; font-size: 12px; flex: 0 0 auto; margin-left: 12px; }
  #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1f2329;
           color: #fff; padding: 10px 18px; border-radius: 6px; font-size: 14px; opacity: 0;
           transition: opacity .25s; pointer-events: none; z-index: 99; }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<header>🎬 视频一键发布</header>
<nav>
  <button data-tab="publish" class="active">发布</button>
  <button data-tab="accounts">账号管理</button>
  <button data-tab="records">任务记录</button>
</nav>
<main>
  <!-- 发布 -->
  <section id="tab-publish">
    <div class="card">
      <h3>发布新视频</h3>
      <label>标题 *</label>
      <input type="text" id="f-title" placeholder="视频标题" />

      <label>简介 / 正文</label>
      <textarea id="f-desc" placeholder="选填，描述正文"></textarea>

      <label>话题标签（逗号分隔，无需 #）</label>
      <input type="text" id="f-tags" placeholder="例如：美食,vlog,日常" />

      <label>视频文件 *</label>
      <div id="drop-zone" class="dropzone">
        <div class="dz-main">📁 点击选择视频，或把视频文件拖到这里</div>
        <div class="dz-sub">大文件上传需要点时间；也可在下方粘贴绝对路径 / 选已有视频</div>
        <input type="file" id="f-upload" class="hide" accept="video/*" />
      </div>
      <div id="selected-file" class="selected hide"></div>
      <div class="hint" id="upload-hint"></div>
      <input type="text" id="f-video-path" style="margin-top:8px"
             placeholder="视频绝对路径（选择后自动填入，也可手动粘贴）" />
      <div class="row" style="margin-top:12px; align-items:center">
        <span class="hint" style="flex:1; margin:0">已有视频（videos/ 目录，点击即选用）：</span>
        <button class="btn ghost" style="flex:0 0 auto" onclick="refreshVideos()">刷新列表</button>
      </div>
      <div id="video-list" class="vlist"></div>

      <label>发布到</label>
      <div class="platforms" id="f-platforms"></div>

      <label>定时发布（留空＝立即发布，使用各平台自带定时）</label>
      <input type="datetime-local" id="f-schedule" />
      <div class="hint">⚠️ 视频号定时只精确到<b>整点</b>（分钟会被忽略），且必须是<b>足够靠后的未来时间</b>（一般需提前到下一个可选整点以后），否则平台不接受。</div>

      <div style="margin-top:18px">
        <button class="btn" id="btn-publish" onclick="doPublish()">🚀 一键发布</button>
      </div>
    </div>
  </section>

  <!-- 账号管理 -->
  <section id="tab-accounts" class="hide">
    <div class="card">
      <h3>账号登录状态</h3>
      <div class="hint">首次使用请逐个「登录」扫码。登录态会保存在本地，过期后回到这里重新登录即可。</div>
      <div id="acct-list" style="margin-top:10px"></div>
    </div>
  </section>

  <!-- 任务记录 -->
  <section id="tab-records" class="hide">
    <div class="card">
      <h3>任务记录</h3>
      <div class="row" style="justify-content:flex-end">
        <button class="btn ghost" style="flex:0 0 auto" onclick="loadTasks()">刷新</button>
      </div>
      <div id="task-list" style="margin-top:10px"></div>
    </div>
  </section>
</main>
<div id="toast"></div>

<script src="/static/app.js"></script>
</body>
</html>
